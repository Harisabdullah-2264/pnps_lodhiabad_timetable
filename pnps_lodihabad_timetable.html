      [mk('U','Saima'),mk('M','Nawaz'),mk('Ch','Haleema'),mk('Isl','Shareef'),mk('E','Rabia'),mk('U','Saima'),mk('P','Tayyba'),mk('Bio','Khola'),mk('MQ','Shareef'),mk('PkSt','Asif')],
      [mk('Bio','Khola'),mk('Ch','Haleema'),mk('U','Saima'),mk('M','Nawaz'),mk('P','Tayyba'),mk('E','Rabia'),mk('MQ','Shareef'),mk('Isl','Shareef'),mk('PkSt','Asif'),mk('M','Nawaz')],

      [mk('M','Tayyba'),mk('P','Tayyba'),mk('E','Asma'),mk('U','Nosheen'),mk('Bio','Nafeesa'),mk('M','Tayyba'),mk('Isl','Nazeer'),mk('Ch','Haleema'),mk('MQ','Shareef'),mk('PkSt','Asif')],

const CLASS_KEYS = ['1A','1B','2A','2B','3A','3B','4A','4B','5A','6A','6B','7A','7B','8A','8B','9A','9B','10A','10B'];
const CLASS_GROUPS = [
  {label:'Class 1',keys:['1A','1B']},
  {label:'Class 2',keys:['2A','2B']},
  {label:'Class 3',keys:['3A','3B']},
  {label:'Class 4',keys:['4A','4B']},
  {label:'Class 5',keys:['5A']},
  {label:'Class 6',keys:['6A','6B']},
  {label:'Class 7',keys:['7A','7B']},
  {label:'Class 8',keys:['8A','8B']},
  {label:'Class 9',keys:['9A','9B']},
  {label:'Class 10',keys:['10A','10B']},
];

const SUBJ_COLORS = {
  'E':'#E6F1FB','U':'#EAF3DE','M':'#FAEEDA','Isl':'#FBEAF0','GK':'#E1F5EE',
  'Sci':'#EAF3DE','SST':'#FAECE7','H':'#FAECE7','Comp':'#EEEDFE',
  'P':'#FCEBEB','Ch':'#FAC775','Bio':'#C0DD97','MQ':'#F4C0D1','PkSt':'#B5D4F4',
  'PT':'#EAF3DE'
};
const SUBJ_TEXT = {
  'E':'#0C447C','U':'#27500A','M':'#633806','Isl':'#72243E','GK':'#085041',
  'Sci':'#27500A','SST':'#712B13','H':'#712B13','Comp':'#3C3489',
  'P':'#791F1F','Ch':'#412402','Bio':'#173404','MQ':'#4B1528','PkSt':'#042C53',
  'PT':'#0F6E56'
};
const SUBJ_FULL = {
  'E':'English','U':'Urdu','M':'Maths','Isl':'Islamiyat','GK':'G.K.',
  'Sci':'Science','SST':'SST','H':'History','Comp':'Computer',
  'P':'Physics','Ch':'Chemistry','Bio':'Biology','MQ':'Mutala Quran','PkSt':'Pak Studies','PT':'PT'
};

let curClass = '1A';
let curSec = 'A';

function renderControls(){
  const cc = document.getElementById('classControls');
  cc.innerHTML = CLASS_GROUPS.map(g=>`<button class="tab${DATA[g.keys[0]].label===DATA[curClass].label?' active':''}" onclick="selectClass('${g.keys[0]}')">${g.label}</button>`).join('');
  const st = document.getElementById('secToggle');
  const grp = CLASS_GROUPS.find(g=>DATA[g.keys[0]].label===DATA[curClass].label);
  if(grp && grp.keys.length>1){
    st.innerHTML = ['A','B'].map(s=>`<button class="sec${curSec===s?' active':''}" onclick="selectSec('${s}')">${s}</button>`).join('');
    st.style.display='flex';
  } else {
    st.style.display='none';
  }
}

function selectClass(k){
  const grp = CLASS_GROUPS.find(g=>DATA[g.keys[0]].label===DATA[k].label);
  curClass = grp.keys[0];
  curSec='A';
  renderControls();
  renderLegend();
  renderTable();
  renderNote();
}

function selectSec(s){
  curSec=s;
  const grp = CLASS_GROUPS.find(g=>DATA[g.keys[0]].label===DATA[curClass].label);
  curClass = grp.keys.find(k=>DATA[k].sec===s)||grp.keys[0];
  renderControls();
  renderTable();
}

function getSubjects(){
  const d = DATA[curClass];
  const set = new Set();
  d.days.forEach(day=>day.forEach(c=>{ if(c.s&&c.s!=='—')set.add(c.s); }));
  return [...set];
}

function renderLegend(){
  const subs = getSubjects();
  document.getElementById('legend').innerHTML = subs.map(s=>`<span class="leg-item" style="background:${SUBJ_COLORS[s]||'var(--color-background-secondary)'};color:${SUBJ_TEXT[s]||'var(--color-text-secondary)'};border-color:transparent">${s} = ${SUBJ_FULL[s]||s}</span>`).join('');
}

function renderTable(){
  const d = DATA[curClass];
  let html = '<thead><tr><th style="min-width:80px">Period</th>';
  DAYS.forEach(day=>html+=`<th class="day-h">${day}</th>`);
  html+='</tr></thead><tbody>';
  let pIdx=0;
  PERIODS.forEach((p,i)=>{
    if(p.isBreak){
      html+=`<tr><td class="period-h">${p.label}<br><span style="font-size:10px;color:var(--color-text-secondary)">${p.time}</span></td><td colspan="4" class="break-row"><i class="ti ti-coffee" aria-hidden="true"></i> Break — ${p.time}</td></tr>`;
    } else {
      html+=`<tr><td class="period-h">${p.label}<br><span style="font-size:10px;color:var(--color-text-secondary)">${p.time}</span></td>`;
      DAYS.forEach((_,di)=>{
        const cell = d.days[di][pIdx];
        if(!cell){html+='<td>—</td>';return;}
        const bg = cell.pt ? SUBJ_COLORS['PT'] : (SUBJ_COLORS[cell.s]||'transparent');
        const tc = cell.pt ? SUBJ_TEXT['PT'] : (SUBJ_TEXT[cell.s]||'var(--color-text-primary)');
        const tname = cell.t ? TEACHERS[cell.t] : '';
        const short = tname ? tname.split(' ').slice(-1)[0] : '';
        html+=`<td><div class="cell${cell.pt?' pt-cell':''}" style="background:${bg}"><div class="subj" style="color:${tc}">${cell.pt?'PT':cell.s}</div>${short?`<div class="tchr">${short}</div>`:''}</div></td>`;
      });
      html+='</tr>';
      pIdx++;
    }
  });
  html+='</tbody>';
  document.getElementById('ttTable').innerHTML=html;
}

function renderNote(){
  const d = DATA[curClass];
  const label = d.label + (d.single?'':' Section '+curSec);
  const isPrimary = ['Class 1','Class 2','Class 3'].includes(d.label);
  const is910 = ['Class 9','Class 10'].includes(d.label);
  document.getElementById('noteBox').innerHTML = `<strong>${label}</strong> — 4 days/week (Mon–Thu) · 10 periods/day · Breaks after P4 & P7 · Each period 35 min · ${is910?'No PT period (9th & 10th)':'PT period included once per week, never last period'}`;
}

renderControls();
renderLegend();
renderTable();
renderNote();
</script>
